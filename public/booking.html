<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จองรถ — DriveElite</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .driver-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.7rem;margin-top:.75rem}
    .driver-card{border:2px solid var(--border);border-radius:10px;padding:1rem;cursor:pointer;transition:all .2s;background:var(--surface2)}
    .driver-card:hover{border-color:rgba(201,168,76,.5)}
    .driver-card.selected{border-color:var(--accent);background:rgba(201,168,76,.08)}
    .driver-card.unavail{opacity:.4;cursor:not-allowed}
    .driver-name{font-weight:600;font-size:.9rem;margin-bottom:.2rem}
    .driver-meta{font-size:.75rem;color:var(--muted);line-height:1.6}
    .no-driver-opt{border:2px dashed var(--border);border-radius:10px;padding:1rem;cursor:pointer;transition:all .2s;text-align:center;color:var(--muted);font-size:.875rem}
    .no-driver-opt:hover,.no-driver-opt.selected{border-color:var(--accent);color:var(--accent)}
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo"><span class="logo-icon">🚘</span>DriveElite</a>
  <ul class="nav-links">
    <li><a href="/">หน้าแรก</a></li>
    <li><a href="/#cars">รถทั้งหมด</a></li>
  </ul>
  <div class="nav-actions" id="navActions">
    <button class="btn btn-outline" onclick="openModal('loginModal')">เข้าสู่ระบบ</button>
    <button class="btn btn-primary" onclick="openModal('registerModal')">สมัครสมาชิก</button>
  </div>
</nav>

<div style="max-width:760px;margin:0 auto;padding:6rem 1.5rem 3rem">
  <h1 style="font-family:'Playfair Display',serif;font-size:2rem;margin-bottom:.4rem">จองรถ</h1>
  <p style="color:var(--muted);margin-bottom:2rem">กรอกข้อมูลด้านล่างเพื่อทำการจอง</p>

  <!-- 1. SELECT CAR -->
  <div class="booking-card">
    <div class="booking-card-title">🚗 เลือกรถ</div>
    <div class="form-group">
      <label class="form-label">ประเภทรถ</label>
      <select class="form-select" id="typeFilter" onchange="filterCars()">
        <option value="">— ทุกประเภท —</option>
      </select>
    </div>
    <div id="carGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:.7rem;margin-top:.75rem">
      <div class="loading"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- 2. DRIVER -->
  <div class="booking-card">
    <div class="booking-card-title">🧑‍✈️ เลือกคนขับ (ไม่บังคับ)</div>
    <div class="no-driver-opt selected" id="noDriverOpt" onclick="selectDriver(null)">ไม่ต้องการคนขับ / ขับเอง</div>
    <div class="driver-grid" id="driverGrid">
      <div class="loading"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- 3. DATE & LOCATION -->
  <div class="booking-card">
    <div class="booking-card-title">📅 วันที่และสถานที่</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">วันรับรถ</label>
        <input class="form-input" type="date" id="startDate">
      </div>
      <div class="form-group">
        <label class="form-label">วันคืนรถ</label>
        <input class="form-input" type="date" id="endDate">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">จุดรับรถ</label>
      <input class="form-input" type="text" id="pickupLocation" placeholder="เช่น สนามบินสุวรรณภูมิ, โรงแรม...">
    </div>
    <div class="form-group">
      <label class="form-label">จุดส่งรถ (ถ้าต่างจากจุดรับ)</label>
      <input class="form-input" type="text" id="dropoffLocation" placeholder="เว้นว่างถ้าคืนที่เดิม">
    </div>
    <div class="form-group">
      <label class="form-label">หมายเหตุ</label>
      <textarea class="form-textarea" id="notes" rows="3" placeholder="ข้อมูลเพิ่มเติม หรือความต้องการพิเศษ..."></textarea>
    </div>
  </div>

  <div class="alert" id="bookingAlert"></div>
  <button class="btn btn-primary btn-lg" style="width:100%" onclick="submitBooking()">✅ ยืนยันการจอง</button>
</div>

<!-- SUCCESS -->
<div class="modal-overlay" id="successModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">🎉 จองรถสำเร็จ!</div></div>
    <div class="modal-body" id="successContent"></div>
    <div class="modal-footer">
      <a href="/" class="btn btn-outline" style="flex:1">กลับหน้าแรก</a>
      <button class="btn btn-primary" style="flex:1" onclick="location.reload()">จองคันใหม่</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div class="modal-overlay" id="loginModal" onclick="closeModal('loginModal',event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">เข้าสู่ระบบก่อนจอง</div>
      <button class="modal-close" onclick="closeModal('loginModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert" id="loginAlert"></div>
      <div class="form-group"><label class="form-label">อีเมล</label><input class="form-input" type="email" id="loginEmail" placeholder="your@email.com"></div>
      <div class="form-group"><label class="form-label">รหัสผ่าน</label><input class="form-input" type="password" id="loginPassword" placeholder="••••••••"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" style="flex:1" onclick="login()">เข้าสู่ระบบ</button></div>
    <div style="text-align:center;padding:0 1.5rem 1.5rem;font-size:.85rem;color:var(--muted)">
      ยังไม่มีบัญชี? <a href="#" style="color:var(--accent)" onclick="closeModal('loginModal');openModal('registerModal')">สมัครสมาชิก</a>
    </div>
  </div>
</div>

<!-- REGISTER -->
<div class="modal-overlay" id="registerModal" onclick="closeModal('registerModal',event)">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">สมัครสมาชิก</div><button class="modal-close" onclick="closeModal('registerModal')">✕</button></div>
    <div class="modal-body">
      <div class="alert" id="registerAlert"></div>
      <div class="form-group"><label class="form-label">ชื่อ-นามสกุล</label><input class="form-input" type="text" id="regName"></div>
      <div class="form-group"><label class="form-label">อีเมล</label><input class="form-input" type="email" id="regEmail"></div>
      <div class="form-group"><label class="form-label">เบอร์โทร</label><input class="form-input" type="tel" id="regPhone"></div>
      <div class="form-group"><label class="form-label">รหัสผ่าน</label><input class="form-input" type="password" id="regPassword"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" style="flex:1" onclick="register()">สมัครสมาชิก</button></div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastIcon"></span>&nbsp;<span id="toastMsg"></span></div>

<script>
let allCars=[], selectedCarId=null, selectedDriverId=null, currentUser=null;

async function init(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('startDate').min=today;
  document.getElementById('endDate').min=today;
  await checkAuth();
  await Promise.all([loadCarTypes(), loadCars(), loadDrivers()]);
  const p=new URLSearchParams(location.search);
  if(p.get('carId')) selectCar(parseInt(p.get('carId')));
}

async function checkAuth(){
  const d=await fetch('/api/me').then(r=>r.json());
  if(d.loggedIn){
    currentUser=d.user;
    document.getElementById('navActions').innerHTML=
      `<span style="color:var(--muted);font-size:.875rem">👤 ${d.user.name}</span>
       <button class="btn btn-ghost btn-sm" onclick="logout()">ออก</button>`;
  }
}

async function loadCarTypes(){
  const types=await fetch('/api/cartypes').then(r=>r.json());
  const sel=document.getElementById('typeFilter');
  types.forEach(t=>{
    const o=document.createElement('option');
    o.value=t.id; o.textContent=`${t.icon} ${t.name}`;
    sel.appendChild(o);
  });
}

async function loadCars(){
  allCars=await fetch('/api/cars').then(r=>r.json());
  renderCars(allCars);
}

function filterCars(){
  const v=document.getElementById('typeFilter').value;
  renderCars(v ? allCars.filter(c=>c.carTypeId==v) : allCars);
}

function renderCars(cars){
  const g=document.getElementById('carGrid');
  if(!cars.length){g.innerHTML='<div style="color:var(--muted);font-size:.875rem;padding:.5rem">ไม่พบรถที่ตรงเงื่อนไข</div>';return;}
  g.innerHTML=cars.map(c=>`
    <div class="car-select-item" id="carOpt${c.id}" onclick="selectCar(${c.id})" style="border:2px solid var(--border);border-radius:10px;padding:.9rem;cursor:pointer;transition:all .2s;background:var(--surface2);text-align:center">
      <div style="font-size:2rem">${c.typeIcon}</div>
      <div style="font-weight:600;font-size:.85rem;margin:.3rem 0">${c.name}</div>
      <div style="font-size:.75rem;color:var(--accent)">${c.typeName}</div>
      <div style="font-size:.75rem;color:var(--muted)">${c.seats} ที่นั่ง</div>
    </div>`).join('');
  if(selectedCarId) highlightCar(selectedCarId);
}

function selectCar(id){
  selectedCarId=id;
  document.querySelectorAll('.car-select-item').forEach(el=>{
    el.style.borderColor='var(--border)'; el.style.background='var(--surface2)';});
  highlightCar(id);
}
function highlightCar(id){
  const el=document.getElementById('carOpt'+id);
  if(el){el.style.borderColor='var(--accent)'; el.style.background='rgba(201,168,76,.08)';}
}

async function loadDrivers(){
  const drivers=await fetch('/api/drivers').then(r=>r.json());
  const g=document.getElementById('driverGrid');
  g.innerHTML=drivers.map(d=>`
    <div class="driver-card${d.available?'':' unavail'}" id="drvOpt${d.id}" onclick="${d.available?`selectDriver(${d.id})`:''}">
      <div class="driver-name">🧑‍✈️ ${d.name}</div>
      <div class="driver-meta">
        📞 ${d.phone}<br>
        ${d.note?`💬 ${d.note}`:''}
      </div>
    </div>`).join('');
}

function selectDriver(id){
  selectedDriverId=id;
  document.querySelectorAll('.driver-card').forEach(el=>el.classList.remove('selected'));
  document.getElementById('noDriverOpt').classList.toggle('selected', id===null);
  if(id!==null){
    const el=document.getElementById('drvOpt'+id);
    if(el) el.classList.add('selected');
  }
}

async function submitBooking(){
  if(!currentUser){openModal('loginModal');return;}
  const alertEl=document.getElementById('bookingAlert');
  const body={
    carId:selectedCarId, driverId:selectedDriverId,
    startDate:document.getElementById('startDate').value,
    endDate:document.getElementById('endDate').value,
    pickupLocation:document.getElementById('pickupLocation').value,
    dropoffLocation:document.getElementById('dropoffLocation').value,
    notes:document.getElementById('notes').value
  };
  const res=await fetch('/api/bookings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json();
  if(data.success){
    const b=data.booking;
    document.getElementById('successContent').innerHTML=`
      <div style="text-align:center;padding:1rem 0">
        <div style="font-size:3.5rem;margin-bottom:.75rem">${b.carTypeIcon}</div>
        <div style="font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:.3rem">${b.carName}</div>
        <div style="color:var(--muted);font-size:.875rem;margin-bottom:1.5rem">หมายเลขการจอง #${String(b.id).padStart(5,'0')}</div>
      </div>
      <div style="background:var(--surface2);border-radius:10px;padding:1rem;font-size:.875rem;line-height:2">
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">วันรับรถ</span><span>${new Date(b.startDate).toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'})}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">วันคืนรถ</span><span>${new Date(b.endDate).toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'})}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">ระยะเวลา</span><span>${b.days} วัน</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">จุดรับรถ</span><span>${b.pickupLocation}</span></div>
        ${b.driverName?`<div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">คนขับ</span><span>${b.driverName}</span></div>`:''}
      </div>
      <p style="font-size:.8rem;color:var(--muted);text-align:center;margin-top:1rem">ทีมงานจะติดต่อกลับเพื่อยืนยันการจองเร็วๆ นี้</p>`;
    document.getElementById('successModal').classList.add('open');
  } else {
    alertEl.className='alert show alert-error'; alertEl.textContent=data.message;
    alertEl.scrollIntoView({behavior:'smooth'});
  }
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id,e){if(e&&e.target!==document.getElementById(id))return;document.getElementById(id).classList.remove('open');}

async function login(){
  const d=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:document.getElementById('loginEmail').value,password:document.getElementById('loginPassword').value})}).then(r=>r.json());
  if(d.success){closeModal('loginModal');location.reload();}
  else{const a=document.getElementById('loginAlert');a.className='alert show alert-error';a.textContent=d.message;}
}
async function register(){
  const d=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:document.getElementById('regName').value,email:document.getElementById('regEmail').value,
      phone:document.getElementById('regPhone').value,password:document.getElementById('regPassword').value})}).then(r=>r.json());
  if(d.success){closeModal('registerModal');location.reload();}
  else{const a=document.getElementById('registerAlert');a.className='alert show alert-error';a.textContent=d.message;}
}
async function logout(){await fetch('/api/logout',{method:'POST'});location.reload();}

init();
</script>
</body>
</html>
